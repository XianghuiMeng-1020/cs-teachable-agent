services:
  - type: web
    name: cs-teachable-agent-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./data/app.db
      - key: ENVIRONMENT
        value: production
      - key: PYTHONPATH
        value: /app
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
    disk:
      name: app-data
      mountPath: /app/data
      sizeGB: 1
