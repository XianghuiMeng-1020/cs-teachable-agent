# M-61: Alembic configuration file

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# max length of characters to apply to the slug
truncate_slug_length = 40

# set to 'true' to run the environment during the revision command
dependencies_include_app = true

# sqlalchemy.url is set dynamically in env.py

[post_write_hooks]
# linting/formatting can be added here

[logging]
# Logging configuration
version = 1
disable_existing_loggers = false

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
